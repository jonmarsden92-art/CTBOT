name: Crypto Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-bot-production
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v4-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-v4-

      - name: Install Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Setup Git
        run: |
          git config user.name "CryptoBot"
          git config user.email "bot@cryptotrader"

      - name: Ensure logs directory
        run: mkdir -p logs

      - name: Run Crypto Bot Loop
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: |
          END=$((SECONDS + 3300))
          RUN=0

          while [ $SECONDS -lt $END ]; do
            RUN=$((RUN + 1))

            echo ""
            echo "========================================="
            echo ">>> RUN $RUN at $(date -u '+%H:%M:%S UTC')"
            echo "========================================="

            python src/crypto_bot.py

            # Commit local changes BEFORE pulling to avoid conflicts
            git add logs/*.json 2>/dev/null || true
            if ! git diff --staged --quiet; then
              git commit -m "🪙 Run $RUN (pre-pull) $(date -u '+%H:%M UTC')" || true
            fi

            # Now working directory is clean
            git pull origin main --rebase || true

            # Push any new commits (including the one we just made)
            git push || true

            REMAINING=$((END - SECONDS))
            if [ $REMAINING -lt 130 ]; then
              echo ">>> Ending cleanly (time buffer reached)"
              break
            fi
            echo ">>> Sleeping 2 minutes..."
            sleep 120
          done

          echo ">>> Session complete"

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crypto-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
