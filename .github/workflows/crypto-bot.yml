name: Crypto Bot

on:
  schedule:
    - cron: '*/10 * * * *'   # safer than every minute (prevents overlap chaos)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-bot-production
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v4-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-v4-

      - name: Install Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Setup Git
        run: |
          git config user.name  "CryptoBot"
          git config user.email "bot@cryptotrader"

      - name: Ensure logs directory
        run: |
          mkdir -p logs

      # ----------------------------------------
      # MAIN LOOP (continuous execution session)
      # ----------------------------------------
      - name: Run Crypto Bot Loop
        run: |
          END=$((SECONDS + 3300))
          RUN=0

          while [ $SECONDS -lt $END ]; do
            RUN=$((RUN + 1))

            echo ""
            echo "========================================="
            echo ">>> RUN $RUN at $(date -u '+%H:%M:%S UTC')"
            echo "========================================="

            # STEP 1: Generate market intelligence
            python src/market_intelligence.py

            # STEP 2: Run trading bot using fresh state
            python src/crypto_bot.py

            # ----------------------------------------
            # Commit updated system state
            # ----------------------------------------
            git pull origin main --rebase || true

            git add \
              logs/crypto_report.json \
              logs/crypto_state.json \
              logs/crypto_agent.json \
              logs/crypto_trades.json \
              2>/dev/null || true

            if ! git diff --staged --quiet; then
              git commit -m "🪙 Run $RUN $(date -u '+%H:%M UTC')" || true
              git push || true
            fi

            # ----------------------------------------
            # Loop control (safety buffer)
            # ----------------------------------------
            REMAINING=$((END - SECONDS))

            if [ $REMAINING -lt 130 ]; then
              echo ">>> Ending cleanly (time buffer reached)"
              break
            fi

            echo ">>> Sleeping 2 minutes..."
            sleep 120
          done

          echo ">>> Session complete"

      # ----------------------------------------
      # ARTIFACTS (debug + audit trail)
      # ----------------------------------------
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crypto-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
