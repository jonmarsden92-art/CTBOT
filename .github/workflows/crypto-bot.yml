name: Crypto Bot

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-bot-production
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-crypto-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-crypto-

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create logs dir
        run: mkdir -p logs

      - name: Restore Bot State
        uses: actions/cache@v4
        with:
          path: |
            logs/crypto_state.json
            logs/crypto_agent.json
          key: crypto-state-${{ github.run_id }}
          restore-keys: crypto-state-

      - name: Run Crypto Bot Loop
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name  "CryptoBot"
          git config user.email "bot@cryptotrader"

          END=$((SECONDS + 3300))
          RUN=0
          while [ $SECONDS -lt $END ]; do
            RUN=$((RUN + 1))
            echo "========================================="
            echo ">>> RUN $RUN at $(date -u '+%H:%M:%S UTC')"
            echo "========================================="

            python src/crypto_bot.py

            git pull --rebase origin main || true
            git add logs/crypto_report.json logs/crypto_state.json logs/crypto_agent.json || true
            git diff --staged --quiet || git commit -m "🪙 Run $RUN $(date -u '+%H:%M')" && git push || true

            echo ">>> Sleeping 2 minutes..."
            sleep 120
          done
          echo ">>> Session complete"

      - name: Save Bot State
        uses: actions/cache@v4
        with:
          path: |
            logs/crypto_state.json
            logs/crypto_agent.json
          key: crypto-state-${{ github.run_id }}

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crypto-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
